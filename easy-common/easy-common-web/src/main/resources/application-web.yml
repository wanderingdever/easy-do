server:
  port: 8080
  servlet:
    encoding:
      charset: utf-8
      force: true
      enabled: true


spring:
  servlet:
    multipart:
      max-file-size: 50MB #单个最大文件大小
      max-request-size: 50MB #总上传的最大数据大小
  main:
    banner-mode: off
    log-startup-info: false

logging:
  level:
    root: error
  file:
    path: ./logs
    name: ${spring.application.name}
  config: classpath:Spring-logback.xml

# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.easy
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-footer: false
    enable-footer-custom: true
    footer-custom-content: Copyright © 2021-2024 Easy. All Rights Reserved.